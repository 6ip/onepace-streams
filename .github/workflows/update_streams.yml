name: Update One Pace Streams

on:
  schedule:
    # This runs automatically every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # This adds a button so you can run it manually anytime!

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to push code back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        # NOTE: Change 'scr.py' to whatever your python file is actually named!
        run: python scr.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add meta/ tracker.json
          # This line checks if any files changed. If they did, it commits and pushes them.
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-updated One Pace streams" && git push)
